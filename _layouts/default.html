<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366f1">
  <title>{{ page.title }} — What A Team</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Favicon and touch icons -->
  <link rel="icon" type="image/png" href="{{ '/assets/icon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/icon.png' | relative_url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title }} — What A Team">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="What A Team — Celebrate team values together">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <meta property="og:site_name" content="What A Team">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} — What A Team">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="{{ '/assets/og-image.png' | absolute_url }}">
  <meta name="twitter:image:alt" content="What A Team — Celebrate team values together">

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --border: #1e1e2e;
      --text: #e4e4ed;
      --text-dim: #8888a0;
      --accent: #6366f1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    nav {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      max-width: 960px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    main {
      padding: 60px 0 80px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 40px;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 8px;
    }

    p {
      color: var(--text-dim);
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    strong { color: var(--text); }

    ul, ol {
      color: var(--text-dim);
      margin-bottom: 16px;
      padding-left: 24px;
      font-size: 0.95rem;
    }

    li { margin-bottom: 6px; }

    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }

    address {
      font-style: normal;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.7;
    }

    footer {
      padding: 40px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--text-dim);
      font-size: 0.88rem;
      font-weight: 500;
    }
    .footer-links a:hover { color: var(--text); }
    .footer-copy {
      color: #555568;
      font-size: 0.82rem;
    }

    @media (max-width: 600px) {
      main { padding: 40px 0 60px; }
      h1 { font-size: 1.6rem; }
      .nav-links { gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="./" class="nav-brand">What A Team</a>
    <div class="nav-links">
      <a href="./">Home</a>
      <a href="support">Support</a>
    </div>
  </nav>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="privacy">Privacy Policy</a>
        <a href="child-safety">Child Safety</a>
        <a href="support">Support</a>
        <a href="impressum">Impressum</a>
        <a href="https://github.com/gariem/what-a-team-resources/issues">Report an Issue</a>
      </div>
      <p class="footer-copy">&copy; 2026 Emilio Rafael Garcia Rios. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
